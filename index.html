<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <base href="/" />
  <title>SocioMonkey Platform</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="styles.css?v=20260602n" />
</head>
<body>
  <!-- Platform orchestration layer (shown when user.role === 'platform_owner') -->
  <div id="platformRoot" style="display:none;"></div>

  <!-- Tenant / LMS layer (shown for all tenant users; hidden until auth check completes) -->
  <div class="layout" id="tenantLayout" style="display:none;">
    <!-- Mobile top bar (hamburger + brand) -->
    <div class="mobile-topbar" id="mobileTopbar">
      <button class="hamburger-btn" id="hamburgerBtn" aria-label="Open menu">&#9776;</button>
      <span class="mobile-brand" id="mobileBrandText">SocioMonkey</span>
    </div>
    <!-- Sidebar overlay (tap to close on mobile) -->
    <div class="mobile-overlay" id="mobileOverlay"></div>
    <!-- Left Sidebar -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <img src="logo.jpg" alt="Ganga Realty" class="sidebar-logo" />
        <small id="sidebarProductLabel" class="sidebar-product-label" style="display:none;"></small>
        <p id="userDisplay" class="user-display"></p>
      </div>
      <div id="productSwitcher"></div>
      <nav class="sidebar-nav" id="sidebarNav"></nav>
      <div class="sidebar-footer">
        <button id="logoutBtn" class="button logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
      </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
      <div id="app"></div>
    </div>
  </div>
  <script>
    // _PERF fallback — guarantees window._PERF is always defined even if perf-tracer.js
    // fails to load or execute. The full IIFE in perf-tracer.js overwrites this on success.
    ;(function(){var f=function(){return 0};window._PERF=window._PERF||{mark:f,end:f,count:f,lap:f,cancel:f,report:function(){},reset:f,enabled:false}})()
    // Global render-lifecycle tracking — set by showContent() before each render call.
    // _guard() in every render module checks _ACTIVE_ROUTE so stale async callbacks
    // are killed immediately on navigation even without a new renderDashboard() call.
    window._ACTIVE_ROUTE     = null
    window._ACTIVE_RENDER_ID = 0
    // Boot verification — printed to console on every page load so you can confirm
    // lifecycle globals are active BEFORE any render code runs.
    console.log('[BOOT]', { ACTIVE_ROUTE: window._ACTIVE_ROUTE, ACTIVE_RENDER_ID: window._ACTIVE_RENDER_ID, PERF_EXISTS: !!window._PERF })
    if (window._ACTIVE_RENDER_ID === undefined) console.error('[BOOT] FATAL: Lifecycle bootstrap failed — _ACTIVE_RENDER_ID is undefined. Verify inline script order in index.html.')
  </script>
  <script src="src/shared/utils/perf-tracer.js?v=20260602k"></script>
  <script src="env.js"></script>

  <!-- ── Config & State ───────────────────────────────────────────── -->
  <script src="src/config/constants.js?v=20260527z"></script>
  <script src="src/config/themes.js?v=20260527z"></script>
  <script src="src/config/feature-flags.js?v=20260527z"></script>
  <script src="src/contexts/app-state.js?v=20260527z"></script>
  <!-- Auth Orchestration (must load after app-state, before api) -->
  <script src="src/auth/auth-manager.js?v=20260602h"></script>
  <!-- Tenant white-label engine (must load after feature-flags + auth-manager) -->
  <script src="src/tenant-context/tenant-context.js?v=20260602h"></script>

  <!-- ── Shared Utilities ─────────────────────────────────────────── -->
  <script src="src/shared/utils/helpers.js?v=20260602c"></script>
  <script src="src/shared/utils/dom-guard.js?v=20260602n"></script>
  <script src="src/shared/services/api.js?v=20260602c"></script>

  <!-- ── Tenant Auth ──────────────────────────────────────────────── -->
  <script src="src/tenant/auth/login.js?v=20260527z"></script>

  <!-- ── Shared Layout & Router ───────────────────────────────────── -->
  <script src="src/shared/layouts/sidebar.js?v=20260602p"></script>
  <script src="src/router/router.js?v=20260602p"></script>

  <!-- ── Products / CRM ───────────────────────────────────────────── -->
  <script src="src/products/crm/dashboard.js?v=20260602k"></script>
  <script src="src/products/crm/leads.js?v=20260602n"></script>
  <script src="src/products/crm/pipeline.js?v=20260602k"></script>
  <script src="src/products/crm/projects.js?v=20260602m"></script>
  <script src="src/products/crm/team.js?v=20260602m"></script>
  <script src="src/products/crm/excel.js?v=20260602m"></script>
  <script src="src/products/crm/reports.js?v=20260602m"></script>
  <script src="src/products/crm/export.js?v=20260602m"></script>

  <!-- ── Tenant Dashboard ─────────────────────────────────────────── -->
  <script src="src/tenant/dashboard/activity-logs.js?v=20260602m"></script>
  <script src="src/tenant/dashboard/profile.js?v=20260602m"></script>

  <!-- ── Legacy Platform Embedded Tab (LMS sidebar) ───────────────── -->
  <script src="src/platform/dashboard/platform-admin.js?v=20260527z"></script>
  <script src="src/platform/tenants/tenants.js?v=20260527z"></script>
  <script src="src/platform/products/products.js?v=20260527z"></script>

  <!-- ── Platform Orchestration Layer (NEW) ───────────────────────── -->
  <script src="src/platform/layout/platform-layout.js?v=20260527z"></script>
  <script src="src/platform/dashboard/platform-home.js?v=20260527z"></script>
  <script src="src/platform/products/product-launcher.js?v=20260527z"></script>
  <script src="src/platform/products/product-hub.js?v=20260527z"></script>
  <script src="src/platform/organizations/org-wizard.js?v=20260602f"></script>
  <script src="src/platform/organizations/organizations.js?v=20260602f"></script>
  <script src="src/platform/tenants/tenant-config.js?v=20260527z"></script>
  <script src="src/platform/analytics/platform-analytics.js?v=20260527z"></script>
  <script src="src/platform/settings/platform-settings.js?v=20260527z"></script>

  <!-- ── Main Entry Point ─────────────────────────────────────────── -->
  <script src="src/main.js?v=20260602h"></script>
</body>
</html>
